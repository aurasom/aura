<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEPTOR PALESTRA VIVA</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #2a2a2a;
            --led: #ff9500; /* Cor de rádio clássico */
        }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .radio-box {
            background: var(--panel);
            width: 90%;
            max-width: 350px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #444;
        }

        .visor {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px inset #333;
        }

        .freq-display { font-size: 3rem; font-weight: bold; color: var(--led); text-shadow: 0 0 10px var(--led); margin: 0; }
        .unit { color: var(--led); font-size: 1rem; opacity: 0.8; }

        .instrucao {
            background: #333;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            color: #bbb;
        }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .btn {
            background: #444;
            border: none;
            color: white;
            padding: 15px 0;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:active { background: var(--led); color: black; }

        .footer-info { margin-top: 20px; font-size: 0.7rem; color: #666; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="radio-box">
    <div class="instrucao">
        ⚠️ <b>IMPORTANTE:</b> Conecte seu fone de ouvido para usar como antena no seu app de Rádio FM nativo.
    </div>

    <div class="visor">
        <p class="freq-display" id="f">---</p>
        <span class="unit">MHz - SINAL FM</span>
    </div>

    <div class="grid">
        <button class="btn" onclick="set('95.7', 'SALA A')">CH 1</button>
        <button class="btn" onclick="set('98.3', 'SALA B')">CH 2</button>
        <button class="btn" onclick="set('101.5', 'SALA C')">CH 3</button>
        </div>

    <div class="footer-info">
        Receptor Digital de Apoio | Palestra Viva
    </div>
</div>

<script>
    function set(freq, nome) {
        document.getElementById('f').innerText = freq;
        // Vibração curta para dar sensação de clique físico
        if (navigator.vibrate) navigator.vibrate(50);
    }
</script>

</body>
</html>
