<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEPTOR OFICIAL - SEU NOME</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        
        .card { background: #1e1e1e; border-radius: 20px; padding: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .logo { font-size: 1.5rem; font-weight: bold; color: #00ff41; letter-spacing: 2px; margin-bottom: 20px; }
        
        .status-badge { background: #222; padding: 10px; border-radius: 50px; display: inline-block; font-size: 0.8rem; border: 1px solid #444; margin-bottom: 20px; }
        .dot { height: 10px; width: 10px; background-color: #00ff41; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0; } }

        .frequencia-master { font-size: 4rem; font-weight: bold; margin: 10px 0; color: #fff; }
        
        .instrucoes-passo { text-align: left; background: #252525; padding: 15px; border-radius: 10px; margin: 20px 0; }
        .passo { margin-bottom: 10px; font-size: 0.9rem; display: flex; align-items: center; }
        .numero { background: #00ff41; color: black; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; justify-content: center; align-items: center; margin-right: 10px; font-weight: bold; flex-shrink: 0; }

        .btn-abrir { background: #00ff41; color: black; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">SUA MARCA</div>
        
        <div class="status-badge">
            <span class="dot"></span> TRANSMISSÃO AO VIVO
        </div>

        <div class="frequencia-master" id="display">95.7</div>
        <p style="color: #888; margin-top: -10px;">MEGAHERTZ (MHz)</p>

        <div class="instrucoes-passo">
            <div class="passo"><span class="numero">1</span> Conecte o fone (antena)</div>
            <div class="passo"><span class="numero">2</span> Clique no botão abaixo</div>
            <div class="passo"><span class="numero">3</span> Sintonize em <b id="f-bold">95.7</b> no App de Rádio</div>
        </div>

        <button class="btn-abrir" onclick="abrirRadio()">ABRIR RÁDIO NATIVO</button>
    </div>

    <script>
        function abrirRadio() {
    // Tenta abrir qualquer app que se identifique como rádio FM
    window.location.href = "intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.APP_MARKET;pkg=com.motorola.fmradio;end";
    
    // Se não abrir em 1 segundo, avisa o usuário
    setTimeout(function() {
        alert("Por favor, abra o aplicativo 'Rádio FM' manualmente no seu menu de aplicativos.");
    }, 1500);
}

        // Função para mudar canal via QR Code ou botões se você quiser
        function mudarCanal(f) {
            document.getElementById('display').innerText = f;
            document.getElementById('f-bold').innerText = f;
        }
    </script>
</body>
</html>
