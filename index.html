<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio FM Digital</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #333;
            --display-color: #00ff41; /* Verde digital */
            --accent-color: #ff9500; /* Laranja rádio */
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .radio-container {
            background-color: var(--panel-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px;
            text-align: center;
            border: 4px solid #444;
        }

        .display {
            background-color: #000;
            color: var(--display-color);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-family: 'Courier New', Courier, monospace;
            border: 2px inset #555;
        }

        .display h2 { margin: 0; font-size: 1.2rem; opacity: 0.7; }
        .display p { margin: 5px 0 0; font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 10px var(--display-color); }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-ch {
            background: linear-gradient(145deg, #444, #222);
            color: white;
            border: none;
            padding: 15px 0;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 3px 3px 5px rgba(0,0,0,0.3);
        }

        .btn-ch:active {
            transform: scale(0.95);
            background: var(--accent-color);
        }

        .volume-control {
            margin-top: 20px;
            color: #ccc;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .label-vol { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
    </style>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>

    <div class="radio-container">
        <div class="display">
            <h2>FM RECEIVER</h2>
            <p id="freq">94.7</p>
        </div>

        <div class="grid-buttons">
            <button class="btn-ch" onclick="setFreq('88.1', 1)">CH 1</button>
            <button class="btn-ch" onclick="setFreq('91.3', 2)">CH 2</button>
            <button class="btn-ch" onclick="setFreq('94.7', 3)">CH 3</button>
            <button class="btn-ch" onclick="setFreq('98.5', 4)">CH 4</button>
            <button class="btn-ch" onclick="setFreq('101.9', 5)">CH 5</button>
            <button class="btn-ch" onclick="setFreq('103.5', 6)">CH 6</button>
            <button class="btn-ch" onclick="setFreq('105.1', 7)">CH 7</button>
            <button class="btn-ch" onclick="setFreq('106.7', 8)">CH 8</button>
            <button class="btn-ch" onclick="setFreq('107.9', 9)">CH 9</button>
        </div>

        <div class="volume-control">
            <div class="label-vol">
                <span>VOLUME</span>
                <span id="vol-val">50%</span>
            </div>
            <input type="range" min="0" max="100" value="50" oninput="updateVol(this.value)">
        </div>
    </div>

    <script>
        function setFreq(f, ch) {
            document.getElementById('freq').innerText = f;
            console.log("Sintonizado no Canal " + ch);
        }

        function updateVol(v) {
            document.getElementById('vol-val').innerText = v + "%";
        }
    </script>
</body>
</html>
